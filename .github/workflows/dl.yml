---
name: downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter up to 20 video page URLs (one per line, or separated by comma)'
        required: true
      quality:
        description: 'Video quality (best, 480, 720, 1080, 1440, 2160)'
        required: false
        default: 'best'
        type: choice
        options:
          - 'best'
          - '480'
          - '720'
          - '1080'
          - '1440'
          - '2160'

jobs:
  actions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-v1
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install yt-dlp and aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg aria2
          pip install --quiet --upgrade yt-dlp

      - name: Create unique folder
        id: folder
        run: |
          mkdir -p direct
          
          if [ -f "direct/run_count.txt" ]; then
            LAST_NUM=$(cat direct/run_count.txt)
          else
            LAST_NUM=0
          fi
          
          NEW_NUM=$((LAST_NUM + 1))
          RUN_FOLDER="direct/run_${NEW_NUM}"
          mkdir -p "$RUN_FOLDER"
          
          echo "$NEW_NUM" > direct/run_count.txt
          
          echo "Created folder: $RUN_FOLDER"
          echo "RUN_FOLDER=$RUN_FOLDER" >> $GITHUB_OUTPUT

      - name: Parse URLs and quality
        id: parse
        run: |
          URLS_INPUT="${{ github.event.inputs.url }}"
          # تبدیل کاما و خط جدید به فاصله و سپس خط جدید
          URLS=$(echo "$URLS_INPUT" | tr ',' '\n' | tr ' ' '\n' | sed '/^$/d' | head -20)
          
          if [ -z "$URLS" ]; then
            echo "No URLs provided." >&2
            exit 1
          fi
          
          echo "$URLS" > urls.txt
          TOTAL_URLS=$(wc -l < urls.txt)
          echo "Total URLs to download: $TOTAL_URLS (max 20)"
          cat urls.txt
          echo "NUM_URLS=$TOTAL_URLS" >> $GITHUB_OUTPUT
          
          QUALITY_INPUT="${{ github.event.inputs.quality }}"
          
          if [ "$QUALITY_INPUT" = "best" ]; then
            QUALITY_FORMAT="best"
          elif [ "$QUALITY_INPUT" = "480" ]; then
            QUALITY_FORMAT="best[height<=480]/best"
          elif [ "$QUALITY_INPUT" = "720" ]; then
            QUALITY_FORMAT="best[height<=720]/best"
          elif [ "$QUALITY_INPUT" = "1080" ]; then
            QUALITY_FORMAT="best[height<=1080]/best"
          elif [ "$QUALITY_INPUT" = "1440" ]; then
            QUALITY_FORMAT="best[height<=1440]/best"
          elif [ "$QUALITY_INPUT" = "2160" ]; then
            QUALITY_FORMAT="best[height<=2160]/best"
          else
            QUALITY_FORMAT="best"
          fi
          
          echo "QUALITY_FORMAT=$QUALITY_FORMAT" >> $GITHUB_OUTPUT

      - name: Download and zip each file (error won't stop others)
        run: |
          RUN_FOLDER="${{ steps.folder.outputs.RUN_FOLDER }}"
          echo "Saving all files to: $RUN_FOLDER"
          
          QUALITY="${{ steps.parse.outputs.QUALITY_FORMAT }}"
          echo "Downloading with quality format: $QUALITY"
          
          if [ -f "cookies.txt" ]; then
            echo "cookies.txt found, using it"
            COOKIE_OPTION="--cookies cookies.txt"
          else
            echo "cookies.txt not found"
            COOKIE_OPTION=""
          fi
          
          # شمارنده موفق و ناموفق
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          TOTAL=$(wc -l < urls.txt)
          
          # حلقه برای هر لینک (با continue در صورت خطا)
          while IFS= read -r url; do
            current=$((SUCCESS_COUNT + FAIL_COUNT + 1))
            echo "========================================="
            echo "[$current/$TOTAL] Processing: $url"
            echo "========================================="
            
            DOMAIN=$(echo "$url" | grep -oE 'https?://[^/]+')
            if [ -z "$DOMAIN" ]; then
              DOMAIN="https://www.whoreshub.com"
            fi
            echo "Using Referer: $DOMAIN"
            
            # ایجاد پوشه جداگانه برای هر ویدیو داخل run_x
            VIDEO_FOLDER="$RUN_FOLDER/video_${current}"
            mkdir -p "$VIDEO_FOLDER"
            
            DL_DIR="dl_${current}"
            mkdir -p "$DL_DIR"
            cd "$DL_DIR"
            
            # دانلود (در صورت خطا، ادامه می‌دهد)
            if yt-dlp \
              --no-check-certificate \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --add-header "Referer: $DOMAIN" \
              --add-header "Accept: video/webm,video/ogg,video/*;q=0.9,*/*;q=0.8" \
              --add-header "Accept-Language: en-US,en;q=0.9" \
              --add-header "Origin: $DOMAIN" \
              --retries 5 \
              --fragment-retries 5 \
              --socket-timeout 30 \
              $COOKIE_OPTION \
              -f "$QUALITY" \
              --external-downloader aria2c \
              --external-downloader-args "-x 16 -s 16 -k 5M --max-connection-per-server=16 --console-log-level=error" \
              -N 16 \
              -o "%(title)s.%(ext)s" \
              "$url" 2>&1; then
              
              # دانلود موفق
              cd ..
              DL_FILE=$(ls -1 "$DL_DIR" | grep -E '\.(mp4|mkv|webm)$' | head -n1)
              
              if [ -n "$DL_FILE" ]; then
                echo "✅ Download successful: $DL_FILE"
                
                FILE_SIZE=$(stat -c%s "$DL_DIR/$DL_FILE" 2>/dev/null || stat -f%z "$DL_DIR/$DL_FILE" 2>/dev/null)
                FILE_SIZE_MB=$((FILE_SIZE / 1048576))
                echo "File size: ${FILE_SIZE_MB} MB"
                
                RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
                ZIP_NAME="${DL_FILE}_${RAND5}.zip"
                
                cp "$DL_DIR/$DL_FILE" "$VIDEO_FOLDER/"
                cd "$VIDEO_FOLDER"
                
                if [ "$FILE_SIZE_MB" -gt 95 ]; then
                  echo "Splitting into parts..."
                  zip -s 95m "$ZIP_NAME" "$DL_FILE"
                  rm -f "$DL_FILE"
                else
                  echo "Zipping..."
                  zip "$ZIP_NAME" "$DL_FILE"
                  rm -f "$DL_FILE"
                fi
                
                cd ../..
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                echo "✅ Saved to: $VIDEO_FOLDER/${ZIP_NAME}"
              else
                echo "⚠️ Download completed but no video file found"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              fi
            else
              # دانلود ناموفق
              cd ..
              echo "❌ Download failed for: $url"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
            
            rm -rf "$DL_DIR"
            echo ""
            
          done < urls.txt
          
          echo "========================================="
          echo "📊 SUMMARY"
          echo "========================================="
          echo "✅ Successful downloads: $SUCCESS_COUNT"
          echo "❌ Failed downloads: $FAIL_COUNT"
          echo "📁 Files saved in: $RUN_FOLDER"
          echo "========================================="
          
          ls -la "$RUN_FOLDER"

      - name: Upload to direct folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config.user email "actions@github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A direct/)" ]; then
            echo "No files to upload."
            exit 0
          fi

          git add direct/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Add run folder [skip ci]"

          for i in $(seq 1 5); do
            echo "Push attempt $i..."
            if git push origin "${{ github.ref_name }}"; then
              echo "Push succeeded!"
              exit 0
            else
              echo "Push failed, pulling latest changes..."
              git pull --rebase origin "${{ github.ref_name }}"
              sleep 3
            fi
          done
          
          echo "Push failed after 5 attempts"
          exit 1
