name: Download Video with hqporner-api

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک ویدیو از hqporner.com'
        required: true
      quality:
        description: 'کیفیت'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '480'
          - 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python and install hqporner-api
        run: |
          pip install hqporner-api
      
      - name: Download with hqporner-api
        run: |
          python3 << EOF
          from hqporner_api.api import Client, Quality
          import os
          
          # ایجاد پوشه videos
          os.makedirs("videos", exist_ok=True)
          
          # انتخاب کیفیت
          quality_map = {
              "1080": Quality._1080,
              "720": Quality._720,
              "480": Quality._480,
              "best": Quality.BEST
          }
          
          quality = quality_map.get("${{ github.event.inputs.quality }}", Quality._1080)
          
          # دانلود
          client = Client()
          video = client.get_video("${{ github.event.inputs.url }}")
          video.download(quality=quality, output_path="videos/")
          
          print("✅ دانلود با موفقیت انجام شد")
          EOF
      
      - name: List downloaded files
        id: files
        run: |
          ls -la videos/
          echo "DOWNLOADED_FILES=$(ls videos/ | wc -l)" >> $GITHUB_OUTPUT
      
      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          git add videos/
          git commit -m "🎬 Add downloaded video from hqporner [skip ci]" || echo "No new files to commit"
          git push origin HEAD:${{ github.ref_name }}
          
          echo "✅ فایل در ریپازیتوری ذخیره شد"
