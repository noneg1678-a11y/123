name: Download Video to Repository

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه ویدیو'
        required: true
        type: string
      quality:
        description: 'کیفیت'
        required: false
        default: '1080'
        type: choice
        options:
          - '1080'
          - '720'
          - '480'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install gallery-dl
        run: |
          pip install gallery-dl
          sudo apt-get install -y ffmpeg
      
      - name: Download with gallery-dl
        id: download
        run: |
          mkdir -p videos
          
          # دانلود با gallery-dl (مخصوص این سایته!)
          gallery-dl \
            --verbose \
            --dest "videos" \
            --filename "{title}.{extension}" \
            --option "video-quality=${{ github.event.inputs.quality }}" \
            "${{ github.event.inputs.url }}"
          
          ls -la videos/
          
          # پیدا کردن فایل
          VIDEO_FILE=$(ls videos/*.mp4 2>/dev/null | head -n1)
          if [ -z "$VIDEO_FILE" ]; then
            VIDEO_FILE=$(ls videos/*.mkv 2>/dev/null | head -n1)
          fi
          
          if [ -z "$VIDEO_FILE" ]; then
            echo "❌ دانلود موفق نبود"
            exit 1
          fi
          
          echo "VIDEO_PATH=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "✅ دانلود شد: $VIDEO_FILE"
      
      - name: Upload to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          
          git add videos/
          git commit -m "🎬 Add downloaded video" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
          
          echo "✅ آپلود شد!"
