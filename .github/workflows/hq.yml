name: dl2

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter video page URL'
        required: true
      quality:
        description: 'Video quality'
        required: false
        default: '1080'
        type: choice
        options:
          - '480'
          - '720'
          - '1080'
          - 'best'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install yt-dlp

      - name: Download video
        id: download
        run: |
          # ساخت پوشه برای فایل نهایی
          mkdir -p downloads
          
          # تنظیم کیفیت
          if [ "${{ github.event.inputs.quality }}" = "1080" ]; then
            QUALITY="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080]/best"
          elif [ "${{ github.event.inputs.quality }}" = "720" ]; then
            QUALITY="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]/best"
          elif [ "${{ github.event.inputs.quality }}" = "480" ]; then
            QUALITY="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]/best"
          else
            QUALITY="bestvideo+bestaudio/best"
          fi
          
          # دانلود با هدرهای مخصوص hqporner
          yt-dlp \
            --no-check-certificate \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --add-header "Referer: https://hqporner.com/" \
            --add-header "Origin: https://hqporner.com" \
            --add-header "Accept-Language: en-US,en;q=0.9" \
            --retries 10 \
            --fragment-retries 10 \
            -f "$QUALITY" \
            --merge-output-format mp4 \
            --external-downloader aria2c \
            --external-downloader-args "-x 16 -s 16 -k 5M" \
            -N 16 \
            -o "downloads/%(title)s.%(ext)s" \
            "${{ github.event.inputs.url }}"
          
          # پیدا کردن فایل دانلود شده
          VIDEO_FILE=$(ls downloads/*.mp4 2>/dev/null | head -n1)
          if [ -z "$VIDEO_FILE" ]; then
            VIDEO_FILE=$(ls downloads/*.mkv 2>/dev/null | head -n1)
          fi
          
          if [ -z "$VIDEO_FILE" ]; then
            echo "Download failed!"
            exit 1
          fi
          
          echo "VIDEO_PATH=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "Downloaded: $VIDEO_FILE"

      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن فایل به گیت
          git add downloads/
          
          # commit کردن (اگه فایل جدید باشه)
          git commit -m "Add downloaded video [skip ci]" || echo "No changes to commit"
          
          # push به ریپازیتوری
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }}
